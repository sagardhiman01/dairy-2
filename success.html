<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success | Vaishnavi Mava Bhandar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Jost:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .success-page {
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--bg-cream);
        }
        .success-card {
            background: white;
            padding: 60px;
            border-radius: 30px;
            box-shadow: var(--shadow-lg);
            max-width: 500px;
            width: 90%;
            transform: scale(0.9);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            to { transform: scale(1); opacity: 1; }
        }
        .success-icon {
            font-size: 80px;
            color: var(--primary);
            margin-bottom: 30px;
        }
        .success-card h1 {
            color: var(--primary-dark);
            margin-bottom: 15px;
        }
        .success-card p {
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        .btn-home {
            background: var(--primary);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
            transition: var(--transition);
        }
        .btn-home:hover {
            background: var(--primary-dark);
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <div class="success-page">
        <div class="success-card">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1>Order Placed!</h1>
            <p>Thank you for choosing Vaishnavi Mava Bhandar. Your fresh dairy produce is being prepared and will be with you shortly.</p>
            <a href="shop.html" class="btn-home">Return to Shop</a>
        </div>
    </div>
    <script>
        // Clear cart on success
        localStorage.removeItem('vaishnavi_cart');
    </script>
</body>
</html>
