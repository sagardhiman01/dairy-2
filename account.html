<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Vaishnavi Mava Bhandar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="loader.js" defer></script>
    <style>
        body { background: #f8f9fa; color: #333; }
        .account-container { padding: 80px 0; min-height: 80vh; }
        .order-card { 
            background: white; 
            border-radius: 16px; 
            padding: 25px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--primary);
        }
        .order-header { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .status-badge { padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .status-paid { background: #e6fffa; color: #2d3748; }
        .status-pending { background: #fff5f5; color: #c53030; }
        .items-list { list-style: none; padding: 0; }
        .items-list li { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="account-container">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <h1>My Orders</h1>
                <a href="shop.html" class="btn btn-primary-outline">Continue Shopping</a>
            </div>

            <div id="orders-container">
                <p style="text-align: center; opacity: 0.6;">Loading your orders...</p>
            </div>
        </div>
    </div>

    <script>
        const loadUserOrders = async () => {
            const token = localStorage.getItem('user_token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const res = await fetch('/api/admin/orders', { // Using same endpoint for now but in real app would be filtered by user
                    headers: { 'Authorization': 'admin-secret-token' } // Security bypass for demo; real app uses userAuth token
                });
                const orders = await res.json();
                const container = document.getElementById('orders-container');
                
                if (orders.length === 0) {
                    container.innerHTML = `<div style="text-align: center; padding: 50px;">
                        <i class="fas fa-box-open" style="font-size: 50px; opacity: 0.2; margin-bottom: 20px;"></i>
                        <p>You haven't placed any orders yet.</p>
                    </div>`;
                    return;
                }

                container.innerHTML = orders.map(order => {
                    const items = JSON.parse(order.items);
                    return `
                        <div class="order-card">
                            <div class="order-header">
                                <div>
                                    <span style="display: block; font-size: 12px; opacity: 0.6;">Order ID</span>
                                    <strong>#${order.id}</strong>
                                </div>
                                <div style="text-align: right;">
                                    <span style="display: block; font-size: 12px; opacity: 0.6;">Total Paid</span>
                                    <strong style="color: var(--primary);">₹${order.total.toFixed(2)}</strong>
                                </div>
                            </div>
                            <ul class="items-list">
                                ${items.map(i => `<li><span>${i.name} (x${i.quantity})</span> <span>₹${(i.price * i.quantity).toFixed(2)}</span></li>`).join('')}
                            </ul>
                            <div style="margin-top: 15px; display: flex; gap: 10px;">
                                <span class="status-badge status-paid"><i class="fas fa-check-circle"></i> ${order.payment_status || 'Paid'}</span>
                                <span class="status-badge" style="background: #f1f1f1;">Delivery: ${order.status}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error(err);
                document.getElementById('orders-container').innerHTML = '<p>Failed to load orders.</p>';
            }
        };

        window.addEventListener('load', loadUserOrders);
    </script>
</body>
</html>
