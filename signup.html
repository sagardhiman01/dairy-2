<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Vaishnavi Mava Bhandar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2D5A27;
            --accent: #E89E19;
            --bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 20% 20%, rgba(45, 90, 39, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, rgba(232, 158, 25, 0.1) 0%, transparent 40%);
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo i { font-size: 30px; color: var(--accent); }
        .logo h1 { margin: 0; font-size: 20px; letter-spacing: 2px; }

        h2 { text-align: center; margin-bottom: 25px; font-weight: 400; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group { margin-bottom: 15px; }
        .full-width { grid-column: span 2; }

        label { display: block; margin-bottom: 8px; font-size: 13px; color: rgba(255,255,255,0.6); }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
        }

        input:focus { outline: none; border-color: var(--accent); }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .footer { text-align: center; margin-top: 20px; font-size: 14px; color: rgba(255,255,255,0.6); }
        .footer a { color: var(--accent); text-decoration: none; }
        .error { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; display: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo"><i class="fas fa-leaf"></i><h1>VAISHNAVI <span>MAVA BHANDAR</span></h1></div>
        <h2>Create Account</h2>
        <div id="error-msg" class="error"></div>
        <form id="signup-form">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="phone" required placeholder="+91 00000 00000">
                </div>
                <div class="form-group full-width">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <div class="form-group full-width">
                    <label>Delivery Address</label>
                    <textarea id="address" rows="2" required placeholder="House No, Street, Landmark..."></textarea>
                </div>
            </div>
            <button type="submit" class="btn">Create Account</button>
            <div style="text-align: center; margin: 15px 0; color: rgba(255,255,255,0.4); font-size: 12px; position: relative;">
                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); position: absolute; width: 100%; top: 5px; z-index: 1;">
                <span style="background: var(--bg); padding: 0 10px; position: relative; z-index: 2;">OR</span>
            </div>
            <!-- Official Google Identity Button -->
            <div id="g_id_onload"
                 data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE.apps.googleusercontent.com"
                 data-context="signup"
                 data-ux_mode="popup"
                 data-callback="handleGoogleResponse"
                 data-auto_select="false"
                 data-itp_support="true">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signup_with"
                 data-size="large"
                 data-logo_alignment="center"
                 style="display: flex; justify-content: center; margin-bottom: 10px;">
            </div>
        </form>
        <div class="footer">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value,
                address: document.getElementById('address').value
            };
            const errorEl = document.getElementById('error-msg');

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.status === 'success') {
                    alert('Account created! Please login.');
                    window.location.href = 'login.html';
                } else {
                    errorEl.textContent = result.error || 'Signup failed';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Connection failed.';
                errorEl.style.display = 'block';
            }
        });

        document.querySelector('.g_id_signin').addEventListener('click', () => {
            const clientId = document.getElementById('g_id_onload').getAttribute('data-client_id');
            if(clientId.includes('YOUR_GOOGLE_CLIENT_ID')) {
                alert("NOTICE: To make this official Google Login work, you must replace 'YOUR_GOOGLE_CLIENT_ID_HERE.apps.googleusercontent.com' in the HTML code with your active Client ID.");
            }
        });

        function handleGoogleResponse(response) {
            try {
                const base64Url = response.credential.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                const payload = JSON.parse(jsonPayload);

                localStorage.setItem('user_token', response.credential);
                localStorage.setItem('user_data', JSON.stringify({
                    name: payload.name,
                    email: payload.email,
                    role: "customer"
                }));
                window.location.href = 'index.html';
            } catch (err) {
                console.error("Google signup failed:", err);
            }
        }
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
