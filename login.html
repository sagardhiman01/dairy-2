<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vaishnavi Mava Bhandar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2D5A27;
            --accent: #E89E19;
            --bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 20% 20%, rgba(45, 90, 39, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, rgba(232, 158, 25, 0.1) 0%, transparent 40%);
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 40px;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .logo h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255,255,255,0.08);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .error {
            background: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">
            <i class="fas fa-leaf"></i>
            <h1>VAISHNAVI <span>MAVA BHANDAR</span></h1>
        </div>
        <h2>Sign In</h2>
        <div id="error-msg" class="error"></div>
        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
                <a href="#" onclick="alert('Password reset link has been sent to your email address!'); return false;" style="color: var(--accent); font-size: 13px; text-decoration: none;">Forgot Password?</a>
            </div>
            <button type="submit" class="btn">Login to Account</button>
            <div style="text-align: center; margin: 15px 0; color: rgba(255,255,255,0.4); font-size: 12px; position: relative;">
                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); position: absolute; width: 100%; top: 5px; z-index: 1;">
                <span style="background: var(--bg); padding: 0 10px; position: relative; z-index: 2;">OR</span>
            </div>
            <button type="button" class="btn" style="background: white; color: #333; display: flex; align-items: center; justify-content: center; gap: 10px;" onclick="googleLogin()">
                <i class="fab fa-google" style="color: #DB4437; font-size: 18px;"></i>
                Continue with Google
            </button>
        </form>
        <div class="footer">
            Don't have an account? <a href="signup.html">Create one</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.token) {
                    localStorage.setItem('user_token', data.token);
                    localStorage.setItem('user_data', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    errorEl.textContent = data.error || 'Invalid credentials';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Connection failed. Please try again.';
                errorEl.style.display = 'block';
            }
        });

        function googleLogin() {
            const email = prompt("Google Sign-In Simulation:\n\nPlease enter the Google email address you want to use to login/register:");
            if (!email) return;
            localStorage.setItem('user_token', 'google-auth-mock-token');
            localStorage.setItem('user_data', JSON.stringify({
                name: email.split('@')[0],
                email: email,
                role: "customer"
            }));
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
